site_name: Phi-Complexity
site_description: Code quality metrics based on Golden Ratio (φ) mathematical invariants
site_url: https://github.com/spockoo/phi-complexity
repo_url: https://github.com/spockoo/phi-complexity
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Accueil: index.md
  - Mathématiques φ-Meta: mathematiques.md
  - Guide d'Utilisation:
    - Installation: installation.md
    - Usage CLI: usage.md
    - Guide Complet: GUIDE.md
  - Architecture:
    - Guide Développeur: DEVELOPER.md
    - Kernel Souverain: kernel-souverain.md
  - Assembleur: ASSEMBLY.md
  - Roadmap & Vision: roadmap.md
  - Licence: licence.md
