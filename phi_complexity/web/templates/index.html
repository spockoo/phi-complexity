<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phidélia IDE - Cyber Station</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Monaco Editor AMD -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(20, 27, 45, 0.6);
            --border-color: rgba(64, 196, 255, 0.2);
            --gold: #FFD700;
            --cyan: #40C4FF;
            --text-color: #e2e8f0;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(20, 30, 48, 1) 0%, rgba(36, 59, 85, 1) 90%);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            background: rgba(11, 15, 25, 0.7);
            z-index: 10;
        }
        header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
        }
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #editor-container {
            flex: 6;
            position: relative;
        }
        #console-container {
            flex: 4;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        #monaco-editor {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #ff4757;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4757;
            transition: all 0.3s;
        }
        .status-dot.connected {
            background-color: #2ed573;
            box-shadow: 0 0 8px #2ed573;
        }
        #logs {
            flex: 1;
            overflow-y: auto;
            color: #a4b0be;
            padding-right: 10px;
        }
        .log-entry {
            margin-bottom: 5px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
        }
        .btn-launch {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .btn-launch:hover {
            background: rgba(64, 196, 255, 0.1);
            box-shadow: 0 0 15px rgba(64, 196, 255, 0.4);
        }
        .log-error { color: #ff6b81; }
        .log-warning { color: #eccc68; }
        .log-success { color: #7bed9f; }
        .log-system { color: var(--cyan); }
        .log-action { color: var(--gold); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <header>
        <h1>PHIDÉLIA // STATION</h1>
        <button class="btn-launch" id="btn-audit" onclick="triggerAudit()">Audit Cybersécuritaire</button>
    </header>

    <div class="main-container">
        <!-- Éditeur de code -->
        <div class="panel" id="editor-container">
            <div id="monaco-editor"></div>
        </div>

        <!-- Terminal de surveillance -->
        <div class="panel" id="console-container">
            <div class="console-header">
                <span style="font-weight:700; color:var(--cyan);">CYBER_TERMINAL φ</span>
                <div>
                    <span style="font-size: 0.75rem; margin-right: 8px; color: #747d8c;">SOCKET_UPLINK</span>
                    <span class="status-dot" id="socket-status"></span>
                </div>
            </div>
            <div id="logs">
                <div class="log-entry log-system">>> S0: En attente d'une directive harmonique...</div>
            </div>
        </div>
    </div>

    <script>
        // Initialisation de Monaco Editor
        let editor;
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: [
                    '# Écrivez votre algorithme souverain',
                    'def f(a, b, c):',
                    '    if a:',
                    '        if b:',
                    '            if c:',
                    '                pass  # Injection',
                    '    return a + b',
                    ''
                ].join('\n'),
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                fontFamily: "'JetBrains Mono', monospace",
            });
            // Theme custom
            monaco.editor.defineTheme('phidelia-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [],
                colors: {
                    'editor.background': '#00000000',
                    'editor.lineHighlightBackground': '#ffffff0a',
                }
            });
            monaco.editor.setTheme('phidelia-dark');
        });

        // WebSocket Logic
        let ws;
        const statusDot = document.getElementById('socket-status');
        const logsContainer = document.getElementById('logs');
        
        function connectWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/ws/pipeline`);
            
            ws.onopen = () => {
                statusDot.classList.add('connected');
                addLog("[System] Connexion au PipelineOrchestrator établie.", 'log-success');
            };

            ws.onclose = () => {
                statusDot.classList.remove('connected');
                addLog("[System] Connexion perdue. Tentative de reconnexion auto dans 3s...", 'log-error');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'log') {
                        parseAndAddLog(data.message);
                    } else if (data.type === 'alert') {
                        addLog(`[Alerte Système] ${data.message}`, 'log-error');
                    } else if (data.type === 'status') {
                        // Update connection state or UI readiness if needed
                    }
                } catch (e) {
                    addLog("[System] Erreur critique lors de l'analyse réseau WebSocket.", 'log-error');
                }
            };
        }
        
        connectWebSocket();

        function parseAndAddLog(msg) {
            let cssClass = '';
            // Pattern matching simpliste pour la colorisation syntaxique du terminal
            if (msg.includes('ERROR') || msg.includes('REJET')) cssClass = 'log-error';
            else if (msg.includes('WARNING')) cssClass = 'log-warning';
            else if (msg.includes('APPROBATION')) cssClass = 'log-success';
            else if (msg.includes('Phidélia')) cssClass = 'log-system';
            else if (msg.includes('->')) cssClass = 'log-action';
            
            addLog(`>> ${msg}`, cssClass);
        }

        function addLog(text, className = '') {
            const el = document.createElement('div');
            el.className = `log-entry ${className}`;
            el.textContent = text;
            logsContainer.appendChild(el);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function triggerAudit() {
            if (ws.readyState !== WebSocket.OPEN) {
                alert("WebSocket hors ligne.");
                return;
            }
            const code = editor.getValue();
            logsContainer.innerHTML = ''; // Nettoyage de la console
            addLog(">> Initialisation de la résonance asynchrone...", "log-system");
            ws.send(JSON.stringify({
                command: "audit_code",
                code: code
            }));
        }
    </script>
</body>
</html>
