name: "🏛️ Phi Governance Gate — Verdict Unifié"

on:
  push:
    branches: [main, "feature/**", "fix/**", "autofix/**"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  governance-verdict:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🏛️ Calculer le verdict φ-pondéré
        id: verdict
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.pull_request?.head?.sha || context.sha;

            let checkRuns = [];
            try {
              const resp = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100
              });
              checkRuns = resp.data.check_runs;
            } catch (err) {
              console.log(`Impossible de récupérer les check runs: ${err.message}`);
            }

            const completedRuns = checkRuns.filter((r) => r.status === "completed");
            const failedRuns = completedRuns.filter(
              (r) => r.conclusion !== "success" && r.conclusion !== "skipped" && r.conclusion !== "neutral"
            );
            const ci_score = completedRuns.length === 0 ? 1.0 : (failedRuns.length === 0 ? 1.0 : 0.0);

            const securityFailed = failedRuns.some(
              (r) =>
                r.name.toLowerCase().includes("security") ||
                r.name.toLowerCase().includes("codeql") ||
                r.name.toLowerCase().includes("codescan")
            );
            const security_score = securityFailed ? 0.0 : 1.0;

            const qualityFailed = failedRuns.some(
              (r) =>
                r.name.toLowerCase().includes("ruff") ||
                r.name.toLowerCase().includes("black") ||
                r.name.toLowerCase().includes("quality")
            );
            const quality_score = qualityFailed ? 0.0 : 1.0;

            const verdict_score =
              // φ-weighted: 0.618 ≈ 1/φ (dominant CI signal),
              // 0.236 ≈ 1/φ² (security), 0.146 ≈ 1/φ³ (quality). Sum = 1.
              0.618 * ci_score + 0.236 * security_score + 0.146 * quality_score;

            let verdict, emoji;
            if (verdict_score >= 0.8) {
              verdict = "allow";
              emoji = "✅";
            } else if (verdict_score >= 0.5) {
              verdict = "warn";
              emoji = "⚠️";
            } else {
              verdict = "deny";
              emoji = "❌";
            }

            core.setOutput("verdict", verdict);
            core.setOutput("verdict_score", verdict_score.toFixed(4));
            core.setOutput("sha", sha);

            const isPR = !!context.payload.pull_request;
            if (isPR) {
              const prNumber = context.payload.pull_request.number;
              const BOT_MARKER = "<!-- phi-governance-verdict -->";
              const body = [
                BOT_MARKER,
                `## 🏛️ Phi Governance Gate — Verdict Unifié`,
                ``,
                `${emoji} **Verdict : ${verdict.toUpperCase()}** (score φ : \`${verdict_score.toFixed(4)}\`)`,
                ``,
                `| Signal | Score | Poids φ |`,
                `|---|---:|---:|`,
                `| CI (tous les checks) | ${ci_score.toFixed(2)} | 0.618 |`,
                `| Sécurité (CodeQL/Codescan) | ${security_score.toFixed(2)} | 0.236 |`,
                `| Qualité (lint/format) | ${quality_score.toFixed(2)} | 0.146 |`,
                ``,
                `> Calculé sur \`${sha.slice(0, 7)}\` — ${completedRuns.length} checks analysés.`,
              ].join("\n");

              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: prNumber, per_page: 100 }
              );
              const existing = comments.find((c) => c.body.includes(BOT_MARKER));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body
                });
              }
            }

      - name: 🔖 Créer le check de gouvernance
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const verdict = "${{ steps.verdict.outputs.verdict }}";
            const score = "${{ steps.verdict.outputs.verdict_score }}";
            const sha = "${{ steps.verdict.outputs.sha }}";
            const conclusion = verdict === "deny" ? "failure" : "success";
            await github.rest.checks.create({
              owner,
              repo,
              name: "🏛️ Phi Governance Gate",
              head_sha: sha,
              status: "completed",
              conclusion,
              output: {
                title: `Verdict φ : ${verdict.toUpperCase()} (score: ${score})`,
                summary: `Le gate de gouvernance φ a rendu un verdict **${verdict}** avec un score pondéré de \`${score}\`.`
              }
            });
