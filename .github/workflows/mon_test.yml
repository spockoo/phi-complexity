name: "Souveraineté Phi"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour effectuer un rebase propre

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Executer le moteur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python engine.py 

      - name: Synchronisation et résolution des conflits
        run: |
          git config --local user.email "phi-bot@outlook.fr"
          git config --local user.name "Phi-Bot"
          
          # Ajout des modifications générées par engine.py
          git add .
          
          # Vérifier s'il y a des changements à committer
          if ! git diff --cached --quiet; then
            git commit -m "🧬 evolution: mutation structurelle [skip ci]"
            
            # Tente un rebase. En cas de conflit (head vs base), 
            # le robot gagne avec '-X theirs'
            git pull --rebase -X theirs origin main
            
            # Pousse les changements vers le dépôt distant
            git push origin main
          else
            echo "Aucun changement détecté, rien à synchroniser."
          fi
