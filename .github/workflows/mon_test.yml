name: "Souveraineté Phi"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour le rebase

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Executer le moteur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python engine.py 

      - name: Synchronisation forcée
        if: github.event_name == 'push'
        run: |
          git config --local user.email "phi-bot@outlook.fr"
          git config --local user.name "Phi-Bot"
          git add .
          # On vérifie s'il y a des changements avant de commit
          if ! git diff --cached --quiet; then
            git commit -m "🧬 evolution: mutation structurelle [skip ci]"
            # REBASE : La clé pour éviter l'erreur non-fast-forward
            git pull --rebase origin main
            git push origin main
          fi
