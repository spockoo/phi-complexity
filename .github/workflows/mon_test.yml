name: "Souveraineté Phi"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour le rebase

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Executer le moteur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python engine.py 

      - name: Synchronisation forcée
        run: |
          git config --local user.email "phi-bot@outlook.fr"
          git config --local user.name "Phi-Bot"
          
          git add .
          
          # On ne commit/push que s'il y a des changements
          if ! git diff --cached --quiet; then
            git commit -m "🧬 evolution: mutation structurelle [skip ci]"
            
            # Récupère les derniers changements et place ton commit au-dessus
            git pull --rebase origin main
            
            # Pousse les changements proprement
            git push origin main
          else
            echo "Aucun changement à synchroniser."
          fi
