name: "Souveraineté & Auto-Évolution"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Permet de lancer l'évolution manuellement depuis l'onglet Actions
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Permet à l'action de repousser du code sur le dépôt
          fetch-depth: 0

      - name: Installer l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installer les outils de qualité
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install .

      - name: 1. Auto-Correction (Lint & Format)
        run: |
          # Ruff va corriger tout ce qu'il peut automatiquement
          ruff check --fix .
          ruff format .

      - name: 2. Vérification stricte (Mypy)
        run: |
          # Vérifie la cohérence du "système nerveux" (types)
          mypy . --ignore-missing-imports

      - name: 3. Soumettre l'Évolution (Auto-PR)
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: auto-evolutionary code refinement (φ-optimized)"
          title: "Mutation Automatique : Optimisation de la structure"
          body: |
            Cette PR a été générée automatiquement par le système d'Auto-Évolution.
            - Corrections de style via Ruff
            - Alignement avec les standards du projet
            - Vérification de l'intégrité des types
          branch: auto-evolution-patch
