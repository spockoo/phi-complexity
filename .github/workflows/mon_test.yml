name: "φ-Validation Engine (non-bloquant)"

# Workflow expérimental : vérifie le moteur racine `engine.py` sans créer de PR.
# Découplé du CI principal pour ne pas perturber les gates de qualité.

on:
  schedule:
    - cron: '0 0 * * *'  # Chaque nuit à minuit UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    name: "Validation du moteur racine"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Installation
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: 🧪 Tests ciblés du moteur racine
        run: pytest tests/test_engine.py -q
