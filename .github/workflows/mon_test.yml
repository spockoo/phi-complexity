name: Mon Test Engine

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure engine.py exists at repository root
        run: test -f engine.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run engine
        run: python engine.py
