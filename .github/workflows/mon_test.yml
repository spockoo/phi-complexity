name: "Souveraineté & Auto-Évolution (φ-Recursive)"

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolutionary_cycle:
    name: "Cycle de Mutation"
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Initialisation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Système Nerveux (Python)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3. Installation Dépendances
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: 4. Exécution du Moteur Phi (Mutation)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # C'est ici qu'on lance ton vrai moteur
          python engine.py
          
      - name: 5. Nettoyage et Formatage
        run: |
          # On assure que la mutation est propre syntaxiquement
          ruff check --fix . || echo "Ruff a corrigé des alertes."
          black .

      - name: 6. Push Direct (si Push)
        if: github.event_name == 'push'
        run: |
          git config --local user.email "phi-bot@outlook.fr"
          git config --local user.name "Phi-Bot"
          git add .
          git commit -m "🧬 evolution: mutation structurelle [skip ci]" || echo "Rien à commiter"
          git push
