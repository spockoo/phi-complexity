name: "Souveraineté & Auto-Évolution (φ-Recursive)"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PHI_THRESHOLD: 1.618  # Constante d'ancrage pour l'évolution

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 * * * *'  # Pulsation horaire : l'organisme s'analyse chaque heure
  workflow_dispatch:      # Déclenchement manuel (Stimulus externe)

permissions:
  contents: write
  pull-requests: write

jobs:
  evolutionary_cycle:
    name: "Cycle de Mutation Structurelle"
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Initialisation de l'ADN
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 2. Activation du Système Nerveux (Python)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 3. Assimilation des Outils d'Analyse
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black
          pip install -e .

      - name: 4. Auto-Réparation (Métaprogrammation de Style)
        run: |
          # Correction automatique des patterns de code non-optimaux
          ruff check --fix .
          black .
          
      - name: 5. Audit de Cohérence (Mypy)
        run: |
          # Validation de l'intégrité des structures de données
          mypy . --ignore-missing-imports --strict || echo "Alert: Structural inconsistencies detected."

      - name: 6. Génération de la Mutation (Auto-PR)
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "evolution(auto): structural mutation aligned with φ-invariants"
          branch: "evolution/phi-mutation"
          base: main
          title: "🧬 Mutation Autonome : Optimisation du Corpus"
          body: |
            ### Rapport d'Évolution Automatique
            **Cycle :** Horaire (Cron 0 * * * *)
            
            **Actions réalisées :**
            - [x] **Auto-Correction** : Alignement syntaxique via Ruff & Black.
            - [x] **Audit Mypy** : Vérification de la stabilité du système nerveux.
            - [x] **Invariants φ** : Optimisation de la radiance structurelle.
            
            *Cette modification a été générée de manière récursive sans intervention humaine directe.*
          labels: |
            auto-evolution
            automated-pr
            phi-optimized

      - name: 7. Extraction de la Version Souveraine
        if: github.ref == 'refs/heads/main'
        id: get_version
        run: |
          # Extrait la version du fichier pyproject.toml
          VERSION=$(grep -m 1 "version =" pyproject.toml | cut -d '"' -f 2)
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: 8. Publication de la Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          # On utilise une syntaxe de secours pour calmer l'éditeur GitHub
          tag_name: ${{ env.VERSION }}
          name: "🧬 Cycle d'Évolution ${{ env.VERSION }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 9. Purge des branches éphémères
        if: always()
        run: |
          # Supprime les branches de mutation déjà fusionnées pour garder l'organisme propre
          git fetch --prune
          for branch in $(git branch -r | grep 'origin/evolution/'); do
            branch_name=$(echo $branch | sed 's/origin\///')
            if [ -z "$(git log main..origin/$branch_name)" ]; then
              echo "Nettoyage de la branche fusionnée : $branch_name"
              git push origin --delete $branch_name || echo "Déjà supprimée."
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
