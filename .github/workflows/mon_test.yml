name: Mon Test Engine

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure engine.py exists at repository root
        run: |
          if [ ! -f engine.py ]; then
            echo "Error: engine.py not found at repository root"
            exit 1
          fi
          python -m py_compile engine.py
