name: 🔒 Configure Branch Protection

# Ce workflow configure les règles de protection des branches importantes
# via l'API GitHub. Il se déclenche manuellement ou à chaque push sur main.
#
# PRÉREQUIS : Un Personal Access Token (PAT) avec la permission
#             "Administration: Read & write" doit être stocké dans
#             les secrets du dépôt sous le nom ADMIN_TOKEN.

on:
  workflow_dispatch:          # Déclenchement manuel depuis l'onglet Actions
  push:
    branches:
      - main
    paths:
      - '.github/workflows/branch-protection.yml'  # Re-apply on config change

permissions:
  contents: read

jobs:
  protect-branches:
    name: Apply Rulesets
    runs-on: ubuntu-latest

    steps:
      - name: 🔒 Protect branch — main
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/branches/main/protection \
            --input - <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "test (3.9)",
                "test (3.10)",
                "test (3.11)"
              ]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": true,
              "required_approving_review_count": 1,
              "require_last_push_approval": true
            },
            "restrictions": null,
            "required_linear_history": true,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true,
            "lock_branch": false,
            "allow_fork_syncing": true
          }
          EOF

      - name: 🔒 Protect branch — develop (if exists)
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          # Vérifie si la branche develop existe avant d'appliquer les règles
          if gh api /repos/${{ github.repository }}/branches/develop \
               --silent 2>/dev/null; then
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${{ github.repository }}/branches/develop/protection \
              --input - <<'EOF'
            {
              "required_status_checks": {
                "strict": true,
                "contexts": [
                  "test (3.9)",
                  "test (3.10)",
                  "test (3.11)"
                ]
              },
              "enforce_admins": false,
              "required_pull_request_reviews": {
                "dismiss_stale_reviews": true,
                "require_code_owner_reviews": true,
                "required_approving_review_count": 1,
                "require_last_push_approval": false
              },
              "restrictions": null,
              "required_linear_history": false,
              "allow_force_pushes": false,
              "allow_deletions": false,
              "block_creations": false,
              "required_conversation_resolution": true,
              "lock_branch": false,
              "allow_fork_syncing": true
            }
          EOF
            echo "✅ Branch 'develop' protected."
          else
            echo "ℹ️ Branch 'develop' does not exist — skipping."
          fi

      - name: 📋 Summary
        run: |
          echo "### 🔒 Branch Protection Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Règle | main | develop |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Revue de code requise (×1) | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Revue CODEOWNERS requise | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Dismiss stale reviews | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Status checks requis (CI verte) | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche à jour avant merge | ✅ | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Force push interdit | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Suppression de branche interdite | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Historique linéaire requis | ✅ | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Conversations résolues requises | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Approbation du dernier push | ✅ | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Admins soumis aux règles | ✅ | ❌ |" >> $GITHUB_STEP_SUMMARY
