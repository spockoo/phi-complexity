name: 🔒 Configure Branch Protection

# Ce workflow configure les règles de protection des branches importantes.
# Exécution manuelle + réapplication automatique lors des changements de ce workflow.
#
# PRÉREQUIS : Un Personal Access Token (PAT) avec la permission
#             "Administration: Read & write" doit être stocké dans
#             les secrets (recommandé) ou variables du dépôt sous le nom ADMIN_TOKEN.

on:
  workflow_dispatch: # Déclenchement manuel depuis l'onglet Actions
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/branch-protection.yml'

permissions:
  contents: read

concurrency:
  group: branch-protection-${{ github.ref }}
  cancel-in-progress: false

jobs:
  protect-branches:
    name: Apply branch protection set
    runs-on: ubuntu-latest
    # Requiert un environnement `branch-protection` configuré côté dépôt
    # (reviewers/approvals éventuels + accès à ADMIN_TOKEN).
    environment: branch-protection

    steps:
      - name: 🔍 Check ADMIN_TOKEN
        env:
          ADMIN_TOKEN_SECRET: ${{ secrets.ADMIN_TOKEN }}
          ADMIN_TOKEN_VAR: ${{ vars.ADMIN_TOKEN }}
        run: |
          ADMIN_TOKEN="${ADMIN_TOKEN_SECRET:-$ADMIN_TOKEN_VAR}"
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "❌ ADMIN_TOKEN is not configured (secret or variable)."
            echo ""
            echo "📋 Configuration en 3 étapes :"
            echo ""
            echo "   1️⃣  Créer un Fine-grained PAT :"
            echo "      → https://github.com/settings/tokens?type=beta"
            echo "      → Repository access : Only select repositories → ${{ github.repository }}"
            echo "      → Permissions → Repository permissions → Administration : Read and write"
            echo ""
            echo "   2️⃣  Ajouter le PAT comme secret (recommandé) ou variable du dépôt :"
            echo "      → https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "      → 'New repository secret' → Name: ADMIN_TOKEN → Value: votre PAT"
            echo "      → (ou Variables: https://github.com/${{ github.repository }}/settings/variables/actions)"
            echo ""
            echo "   3️⃣  Configurer l'environnement 'branch-protection' :"
            echo "      → https://github.com/${{ github.repository }}/settings/environments"
            echo "      → Créer l'environnement 'branch-protection' s'il n'existe pas"
            echo "      → Vérifier que ADMIN_TOKEN est accessible dans cet environnement"
            echo ""
            echo "⚠️  Note : Un PAT configuré sur votre profil GitHub n'est PAS automatiquement"
            echo "   disponible comme secret de dépôt. Vous devez copier la valeur du PAT"
            echo "   et la coller manuellement dans les secrets du dépôt (étape 2)."
            exit 1
          fi
          if [ -z "$ADMIN_TOKEN_SECRET" ] && [ -n "$ADMIN_TOKEN_VAR" ]; then
            echo "::warning::ADMIN_TOKEN is sourced from repository variable. Use a repository secret when possible."
          fi
          echo "✅ ADMIN_TOKEN is available."

      - name: 🎯 Resolve protected branch targets
        id: targets
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN || vars.ADMIN_TOKEN }}
        run: |
          mapfile -t all_branches < <(
            gh api --paginate /repos/${{ github.repository }}/branches --jq '.[].name'
          )
          targets=()
          for branch in "${all_branches[@]}"; do
            if [[ "$branch" == "copilot/"* ]]; then
              continue
            fi
            if [[ "$branch" == "main" || "$branch" == "develop" || "$branch" =~ ^release/ ]]; then
              targets+=("$branch")
            fi
          done
          if [ "${#targets[@]}" -eq 0 ]; then
            # Filet de sécurité : on protège au minimum `main`
            # même si aucun pattern ne correspond.
            targets=("main")
          fi
          {
            echo "branches<<EOF"
            printf '%s\n' "${targets[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🔒 Apply protection on targets
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN || vars.ADMIN_TOKEN }}
        run: |
          while IFS= read -r branch; do
            [ -z "$branch" ] && continue
            if [ "$branch" = "main" ]; then
              enforce_admins=true
              require_last_push_approval=true
              required_linear_history=true
            else
              enforce_admins=false
              require_last_push_approval=false
              required_linear_history=false
            fi
            encoded_branch=$(jq -rn --arg b "$branch" '$b|@uri')
            echo "Applying branch protection on '$branch'..."
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${{ github.repository }}/branches/${encoded_branch}/protection \
              --input - <<EOF
            {
              "required_status_checks": {
                "strict": true,
                "contexts": ["ci-gate"]
              },
              "enforce_admins": ${enforce_admins},
              "required_pull_request_reviews": {
                "dismiss_stale_reviews": true,
                "require_code_owner_reviews": true,
                "required_approving_review_count": 1,
                "require_last_push_approval": ${require_last_push_approval}
              },
              "restrictions": null,
              "required_linear_history": ${required_linear_history},
              "allow_force_pushes": false,
              "allow_deletions": false,
              "block_creations": false,
              "required_conversation_resolution": true,
              "lock_branch": false,
              "allow_fork_syncing": true
            }
          EOF
          done <<< "${{ steps.targets.outputs.branches }}"

      - name: 📋 Summary
        run: |
          echo "### 🔒 Branch Protection Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branches ciblées :**" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r branch; do
            [ -z "$branch" ] && continue
            echo "- \`$branch\`" >> $GITHUB_STEP_SUMMARY
          done <<< "${{ steps.targets.outputs.branches }}"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Check requis stable : \`ci-gate\`" >> $GITHUB_STEP_SUMMARY
          echo "- Exclusion explicite : branches \`copilot/*\`" >> $GITHUB_STEP_SUMMARY
