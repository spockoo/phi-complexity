name: "🖥️ Couche OS — Compatibilité Multi-Plateforme (φ-Arch)"

# Validation de la portabilité du noyau φ-complexity sur les couches OS.
# Architecture inspirée Arch Linux : minimalisme, transparence, rolling.
#
# Couches testées :
#   · ubuntu-latest  — Noyau Linux (systemd, glibc)
#   · ubuntu-24.04   — LTS courant (base CI stable)
#   · macos-latest   — Darwin / XNU kernel (BSD layer)
#   · macos-14       — Apple Silicon ARM64 (couche Darwin stable)
#   · windows-latest — NT kernel (MSVC toolchain)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  os-matrix:
    name: "os (${{ matrix.os }} · py${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux layer (noyau glibc) ──
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-24.04
            python-version: "3.13"

          # ── Darwin layer (XNU / BSD) ──
          - os: macos-latest
            python-version: "3.13"
          - os: macos-14
            python-version: "3.12"

          # ── NT layer (Windows MSVC) ──
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: 'pip'

      - name: 📦 Installation minimale (zero deps — souveraineté)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

      - name: 🏗️ Vérification de l'architecture
        shell: bash
        run: |
          echo "┌──────────────────────────────────────────┐"
          echo "│  φ-ARCH · Diagnostic de couche OS        │"
          echo "├──────────────────────────────────────────┤"
          echo "│  OS       : ${{ matrix.os }}"
          echo "│  Python   : $(python --version)"
          echo "│  Platform : $(python -c 'import platform; print(platform.platform())')"
          echo "│  Arch     : $(python -c 'import platform; print(platform.machine())')"
          echo "│  Impl     : $(python -c 'import platform; print(platform.python_implementation())')"
          echo "└──────────────────────────────────────────┘"

      - name: 🧪 Tests noyau (sans couverture — portabilité pure)
        run: python -m pytest tests/ --no-cov -x -q

      - name: 🔬 Vérification des imports critiques
        shell: bash
        run: |
          python -c "
          import sys
          from phi_complexity.core import calculer_sync_index
          from phi_complexity.analyseur import AnalyseurPhi
          from phi_complexity.metriques import CalculateurRadiance
          print(f'✓ Imports critiques validés sur {sys.platform} ({sys.version})')
          "
