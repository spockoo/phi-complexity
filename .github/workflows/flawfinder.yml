# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: flawfinder

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '17 21 * * 6'

jobs:
  flawfinder:
    name: Flawfinder
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Identify C/C++ analysis targets (production only)
        id: targets
        run: |
          # Exclure les fichiers d'exemples pédagogiques du scan de production.
          # Les exemples/ contiennent du code à visée éducative et sont traités
          # séparément par `phi shield --include-demo`.
          files=$(find . -path ./.git -prune -o -path ./examples -prune -o \
            -type f \( -name '*.c' -o -name '*.cpp' -o -name '*.cc' \
            -o -name '*.h' -o -name '*.hpp' -o -name '*.hh' \) -print | sort | tr '\n' ' ')
          echo "files=${files}" >> "$GITHUB_OUTPUT"
          if [ -n "$files" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "✅ C/C++ production targets: $files"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No C/C++ production files found — scan skipped."
          fi

      - name: flawfinder_scan
        if: steps.targets.outputs.found == 'true'
        uses: david-a-wheeler/flawfinder@8e4a779ad59dbfaee5da586aa9210853b701959c
        with:
          arguments: "--sarif ${{ steps.targets.outputs.files }}"
          output: 'flawfinder_results.sarif'

      - name: Create empty SARIF (no C/C++ targets)
        if: steps.targets.outputs.found != 'true'
        run: |
          cat > flawfinder_results.sarif << 'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "runs": [{"tool": {"driver": {"name": "Flawfinder", "version": "0.0.0"}}, "results": []}]
          }
          EOF

      - name: Upload analysis results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{github.workspace}}/flawfinder_results.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flawfinder-results
          path: flawfinder_results.sarif
          retention-days: 7

      - name: Install phi-complexity
        run: pip install -e .

      - name: Security gate (phi shield)
        run: |
          phi shield ./phi_complexity \
            --sarif ${{github.workspace}}/flawfinder_results.sarif \
            --output .phi/security_audit.json \
            --min-security-score 70

      - name: Upload security audit (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: .phi/security_audit.json
          retention-days: 7
