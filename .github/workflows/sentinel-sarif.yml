name: "🔬 Sentinel SARIF — Export Sécurité vers GitHub Security Tab"

# Convertit les findings phi-complexity et sentinel en format SARIF
# pour intégration native avec l'onglet Security de GitHub.
#
# Ce workflow complémente flawfinder.yml en ajoutant les détections
# spécifiques à phi-complexity (CWE-134, LILITH, RAII, etc.).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  sentinel-sarif:
    name: "φ-Sentinel SARIF Export"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: 📦 Installation
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 🔬 Générer le SARIF phi-complexity
        run: |
          python -c "
          import json, glob, os, sys

          from phi_complexity.backends.c_rust_light import CRustLightBackend

          # ── Collecte des findings ──
          findings = []
          patterns = ['**/*.c', '**/*.cpp', '**/*.h', '**/*.hpp', '**/*.rs']
          fichiers = []
          for p in patterns:
              fichiers.extend(glob.glob(p, recursive=True))

          for f in sorted(set(fichiers)):
              try:
                  backend = CRustLightBackend(f)
                  res = backend.analyser()
                  for a in res.annotations:
                      level_map = {
                          'CRITICAL': 'error',
                          'WARNING': 'warning',
                          'INFO': 'note',
                      }
                      findings.append({
                          'file': f,
                          'line': a.ligne,
                          'category': a.categorie,
                          'message': a.message,
                          'level': level_map.get(a.niveau, 'note'),
                      })
              except Exception as e:
                  print(f'⚠️ {f}: {e}', file=sys.stderr)

          # ── Construction du SARIF ──
          results = []
          rules_map = {}
          for finding in findings:
              rule_id = f'phi/{finding[\"category\"]}'
              if rule_id not in rules_map:
                  rules_map[rule_id] = {
                      'id': rule_id,
                      'name': finding['category'],
                      'shortDescription': {'text': f'phi-complexity: {finding[\"category\"]}'},
                      'defaultConfiguration': {'level': finding['level']},
                  }
              results.append({
                  'ruleId': rule_id,
                  'level': finding['level'],
                  'message': {'text': finding['message']},
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {'uri': finding['file']},
                          'region': {'startLine': finding['line']},
                      }
                  }],
              })

          sarif = {
              '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
              'version': '2.1.0',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'phi-complexity',
                          'version': '0.2.1',
                          'informationUri': 'https://github.com/spockoo/phi-complexity',
                          'rules': list(rules_map.values()),
                      }
                  },
                  'results': results,
              }],
          }

          os.makedirs('.phi', exist_ok=True)
          with open('.phi/phi_sentinel.sarif', 'w') as f:
              json.dump(sarif, f, indent=2, ensure_ascii=False)

          print(f'✅ SARIF généré: {len(results)} finding(s), {len(rules_map)} règle(s).')
          "

      - name: 📤 Upload SARIF vers GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .phi/phi_sentinel.sarif
          category: phi-sentinel

      - name: 📁 Upload artefact SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phi-sentinel-sarif-${{ github.sha }}
          path: .phi/phi_sentinel.sarif
          retention-days: 14
