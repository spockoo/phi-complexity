name: "Souveraineté Récursive Phi"

on:
  schedule:
    - cron: '0 0 * * *' # S'exécute chaque nuit à minuit UTC
  workflow_dispatch: # Permet de le lancer manuellement pour tester

concurrency:
  group: auto-evolution-phi
  cancel-in-progress: true

jobs:
  phi_evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Requis pour la fonction de PR automatique

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour éviter les erreurs de branche

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Evolution Engine
        id: evolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Donne l'accès au script engine.py
          PHI_AUTOMATION_BRANCH: evolution/phi-mutation
        run: |
          # Lance le script (idempotent : une seule PR ouverte pour la branche d'évolution)
          python engine.py
