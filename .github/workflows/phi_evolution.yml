name: "Souveraineté Récursive Phi"

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # S'exécute chaque nuit

jobs:
  phi_evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Evolution Engine
        id: evolve
        run: |
          # On lance le moteur et on capture si une modification a eu lieu
          python engine.py
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit & Push Changes
        if: steps.evolve.outputs.changed != '0'
        run: |
          git config --local user.email "phi-bot@outlook.fr"
          git config --local user.name "Phi-Complexity Bot"
          git add .
          git commit -m "🧬 evolution: rééquilibrage du ratio mathématique [skip ci]"
          git push
