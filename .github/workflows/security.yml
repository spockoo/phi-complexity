name: "🔐 Sécurité — Dependency Review"

# Revue de sécurité des dépendances :
# - Dependency Review : bloque les PR qui introduisent des dépendances vulnérables
# - Secret scanning : activé au niveau du dépôt (paramètres GitHub)
# - CodeQL : géré par le "default setup" activé dans les paramètres du dépôt
#   (un workflow avancé ici provoquerait un conflit avec le default setup)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    # S'exécute uniquement sur les PR pour bloquer les dépendances vulnérables
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Revue des dépendances
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, LGPL-2.0
