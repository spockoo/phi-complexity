name: "📊 Analyse de Risque des Commits (Bayésien)"

# Analyse bayésienne du risque de chaque commit/PR.
# Produit un score de risque [0,1] + rapport explicable.
# Dépose un artefact JSON + commente la PR avec le score.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  commit-risk:
    name: "Score de Risque Bayésien"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout (historique complet pour diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Installation
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 📊 Calcul du score de risque
        id: risk
        run: |
          python -m phi_complexity.commit_risk \
            --sha "${{ github.sha }}" \
            --output /tmp/commit-risk.json
          SCORE=$(python -c "import json; d=json.load(open('/tmp/commit-risk.json')); print(d['score'])")
          NIVEAU=$(python -c "import json; d=json.load(open('/tmp/commit-risk.json')); print(d['niveau'])")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "niveau=$NIVEAU" >> "$GITHUB_OUTPUT"

      - name: 📁 Upload artefact rapport de risque
        uses: actions/upload-artifact@v4
        with:
          name: commit-risk-report-${{ github.sha }}
          path: /tmp/commit-risk.json
          retention-days: 30

      - name: 💬 Commentaire PR avec score de risque
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          RISK_SCORE: ${{ steps.risk.outputs.score }}
          RISK_NIVEAU: ${{ steps.risk.outputs.niveau }}
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/commit-risk.json', 'utf8'));
            const score = parseFloat(process.env.RISK_SCORE);
            const niveau = process.env.RISK_NIVEAU;
            const emoji = score < 0.3 ? '✅' : score < 0.6 ? '⚠️' : '🚨';
            const facteurs = report.facteurs_dominants || [];
            const body = [
              `## ${emoji} Analyse de Risque Bayésien — Score: \`${(score * 100).toFixed(1)}%\``,
              '',
              `**Niveau de risque**: ${niveau}`,
              `**SHA**: \`${report.sha || context.sha}\``,
              '',
              '### Facteurs dominants',
              facteurs.length > 0
                ? facteurs.map(f => `- ${f}`).join('\n')
                : '- Aucun facteur à risque élevé détecté.',
              '',
              '> Analyse produite par [phi-complexity/commit_risk](../blob/main/phi_complexity/commit_risk.py) · Modèle Bayésien Naïf',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: 🚨 Échec si risque critique
        if: steps.risk.outputs.niveau == 'CRITIQUE'
        run: |
          echo "🚨 Score de risque critique détecté : ${{ steps.risk.outputs.score }}"
          echo "Consultez l'artefact commit-risk-report pour les détails."
          exit 1
