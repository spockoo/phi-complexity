name: "CI — Notebooks (φ-Optionnel)"

# Validation optionnelle : vérifie que les notebooks sont syntaxiquement
# valides et que les imports fonctionnent. N'exécute pas les cellules
# de visualisation (nécessitent matplotlib interactif).

on:
  push:
    branches: [ main ]
    paths:
      - 'notebooks/**'
      - 'phi_complexity/notebook_helpers.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'notebooks/**'
      - 'phi_complexity/notebook_helpers.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-notebooks:
    name: "validate-notebooks"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: 📦 Installation
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[notebooks]"
          pip install nbformat

      - name: 🔍 Valider la syntaxe des notebooks
        run: |
          python -c "
          import nbformat
          import glob
          import sys

          errors = []
          for nb_path in sorted(glob.glob('notebooks/*.ipynb')):
              try:
                  with open(nb_path, 'r', encoding='utf-8') as f:
                      nb = nbformat.read(f, as_version=4)
                  nbformat.validate(nb)
                  print(f'  ✓ {nb_path} ({len(nb.cells)} cells)')
              except Exception as e:
                  errors.append(f'{nb_path}: {e}')
                  print(f'  ✗ {nb_path}: {e}')

          if errors:
              sys.exit(1)
          print(f'\nTous les notebooks sont valides.')
          "

      - name: 📓 Valider les imports notebook_helpers
        run: |
          python -c "
          from phi_complexity.notebook_helpers import (
              charger_metriques,
              charger_harvest,
              radar_radiance,
              carte_heisenberg,
              spirale_doree,
              enregistrer_magics,
          )
          print('✓ Tous les imports notebook_helpers fonctionnent.')
          "
