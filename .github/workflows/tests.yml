name: Phi-Complexity CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.head_ref || github.ref_name }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov ruff
        pip install -e .

    - name: Auto-Fix (Ruff)
      # Auto-correct fixable lint issues and commit them back to the branch.
      # This prevents transient E741/F401 style violations from blocking CI.
      run: |
        ruff check --fix phi_complexity/ tests/ || true
        if ! git diff --quiet; then
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "style(auto): ruff --fix applied by CI [skip ci]"
          git push
        fi

    - name: Lint (Ruff)
      run: |
        ruff check phi_complexity/ tests/

    - name: Run unit tests
      run: |
        pytest tests/ --cov=phi_complexity --cov-report=xml

    - name: Radiant Auto-Audit
      run: |
        python -m phi_complexity.cli check . --min-radiance 50
        python -m phi_complexity.cli memory

    - name: Formal Type Verification (MyPy)
      run: |
        pip install mypy
        mypy phi_complexity/
