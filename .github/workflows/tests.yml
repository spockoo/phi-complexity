name: "CI — Tests & Qualité (φ-Stable)"

# Pipeline CI principal : lint → typage → tests avec couverture.
# Matrice : Python 3.9–3.14 (bugfix) + 3.15 (pre-release).
# Couches OS : ubuntu-latest (noyau), macos-latest (darwin).
# Aucune mutation automatique, aucun push vers main.
# Permissions minimales (lecture seule).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # COUCHE 1 — Qualité (lint/format/type)
  # ─────────────────────────────────────────────────────────────
  quality:
    name: "quality (ruff + black + mypy)"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          allow-prereleases: true
          cache: 'pip'

      - name: 📦 Installation des dépendances qualité
        run: |
          python -m pip install --upgrade pip
          pip install 'ruff==0.15.10' 'black==25.11.0' 'mypy==1.20.0'
          pip install -e ".[notebooks]" || pip install -e .
          pip install ipython || true

      - name: ✨ Lint (Ruff)
        run: ruff check .

      - name: 🎨 Format check (Black)
        run: black --check .

      - name: 🔍 Typage (mypy)
        run: mypy phi_complexity --ignore-missing-imports

  # ─────────────────────────────────────────────────────────────
  # COUCHE 2 — Noyau stable (tests + couverture)
  # ─────────────────────────────────────────────────────────────
  test:
    name: "test (${{ matrix.python-version }} · ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: [quality]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # ── Darwin layer (couche macOS) — versions stables récentes ──
          - os: macos-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.14"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: 'pip'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e ".[notebooks]" || pip install -e .
          pip install ipython || true

      - name: 🧪 Tests avec couverture
        run: pytest --cov=phi_complexity --cov-report=xml --cov-fail-under=89

      - name: 🧩 Générer la couverture cœur vs optionnelle
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          python - <<'PY'
          import json
          import os
          from phi_complexity.coverage_reporting import (
              calculer_snapshot_couverture,
              rapport_couverture_markdown,
          )

          snapshot = calculer_snapshot_couverture("coverage.xml")
          os.makedirs(".phi", exist_ok=True)
          with open(".phi/coverage-summary.json", "w", encoding="utf-8") as fh:
              json.dump(snapshot.to_dict(), fh, ensure_ascii=False, indent=2)
          with open(".phi/coverage-summary.md", "w", encoding="utf-8") as fh:
              fh.write(rapport_couverture_markdown(snapshot))
          PY

      - name: 📊 Upload artefact couverture
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: 📊 Upload artefact couverture segmentée
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: |
            .phi/coverage-summary.json
            .phi/coverage-summary.md
          retention-days: 14

      - name: 📋 Publier le résumé couverture
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          if [ -f .phi/coverage-summary.md ]; then
            cat .phi/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────────────────────
  # COUCHE 3 — Pre-release bleeding edge (CPython dev)
  # ─────────────────────────────────────────────────────────────
  test-prerelease:
    name: "test (3.15-dev · ubuntu — pre-release)"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.15 (pre-release)
        uses: actions/setup-python@v5
        with:
          python-version: "3.15"
          allow-prereleases: true

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov || true
          pip install -e . || pip install -e . --no-build-isolation

      - name: 🧪 Tests (pre-release, tolérant)
        run: |
          python -m pytest tests/ --no-cov -x -q || echo "⚠️ Certains tests échouent sur 3.15-dev — attendu en pre-release."

  ci-gate:
    name: "ci-gate"
    runs-on: ubuntu-latest
    needs: [quality, test]
    # Toujours exécuté pour publier un statut explicite même si le job `test`
    # est annulé ou ignoré, afin d'avoir un check de protection stable.
    if: always()

    steps:
      - name: ✅ Gate des checks requis
        run: |
          quality_result="${{ needs.quality.result }}"
          test_result="${{ needs.test.result }}"

          # Politique explicite: tout état différent de "success"
          # (failure, cancelled, skipped, etc.) fait échouer la gate.
          if [ "$quality_result" != "success" ] || [ "$test_result" != "success" ]; then
            echo "╔══════════════════════════════════════════════════════╗"
            echo "║  φ-CI GATE — ÉCHEC DÉTECTÉ                          ║"
            echo "╚══════════════════════════════════════════════════════╝"
            echo ""
            echo "  Job quality : result=$quality_result"
            echo "  Job test    : result=$test_result"
            echo "  SHA      : ${{ github.sha }}"
            echo "  Branche  : ${{ github.ref_name }}"
            echo ""
            echo "══ Diagnostic — Reproduction locale ══════════════════"
            echo ""
            echo "  1. Cloner et basculer sur le commit fautif :"
            echo "     git checkout ${{ github.sha }}"
            echo ""
            echo "  2. Installer les dépendances :"
            echo "     pip install -e '.[notebooks]' || pip install -e ."
            echo "     pip install 'ruff==0.15.10' 'black==25.11.0' 'mypy==1.20.0' pytest pytest-cov"
            echo ""
            echo "  3. Reproduire chaque étape CI dans l'ordre :"
            echo "     ruff check ."
            echo "     black --check ."
            echo "     mypy phi_complexity --ignore-missing-imports"
            echo "     pytest --cov=phi_complexity --cov-report=term-missing --cov-fail-under=89 -v"
            echo ""
            echo "  4. Consulter le rapport de couverture pour identifier"
            echo "     les modules sous le seuil de 89%."
            echo ""
            echo "══ Liens utiles ═══════════════════════════════════════"
            echo "  Logs CI : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "  Commit  : ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            echo "══════════════════════════════════════════════════════"
            exit 1
          fi
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  φ-CI GATE — TOUS LES CHECKS SONT PASSÉS  ✅        ║"
          echo "╚══════════════════════════════════════════════════════╝"
