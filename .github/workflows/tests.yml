name: "CI — Tests & Qualité (φ-Stable)"

# Pipeline CI principal : lint → typage → tests avec couverture.
# Aucune mutation automatique, aucun push vers main.
# Permissions minimales (lecture seule).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: "test (${{ matrix.python-version }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install ruff 'black==25.11.0' mypy pytest pytest-cov
          pip install -e .

      - name: ✨ Lint (Ruff)
        run: ruff check .

      - name: 🎨 Format check (Black)
        run: black --check .

      - name: 🔍 Typage (mypy)
        run: mypy phi_complexity --ignore-missing-imports

      - name: 🧪 Tests avec couverture
        run: pytest --cov=phi_complexity --cov-report=xml --cov-fail-under=89

      - name: 📊 Upload artefact couverture
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
