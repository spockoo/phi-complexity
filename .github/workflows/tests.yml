name: "Souveraineté & Auto-Évolution (φ-Recursive)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Pulsation horaire
  workflow_dispatch:      # Stimulus manuel

permissions:
  contents: write
  pull-requests: write

jobs:
  evolutionary_cycle:
    name: "Cycle d'Évolution & Tests"
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: 🧬 1. Initialisation de l'ADN
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial pour permettre le rebase
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 2. Système Nerveux (Python ${{ matrix.python-version }})
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 3. Installation & Dépendances
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest mypy
          pip install -e .

      - name: 📐 4. Exécution du Moteur Phi (Mutation)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python engine.py

      - name: ✨ 5. Auto-Réparation (Ruff & Black)
        run: |
          ruff check --fix . || echo "Ajustements mineurs"
          black .

      - name: 🧪 6. Audit de Qualité (Tests & Types)
        run: |
          mypy . --ignore-missing-imports || echo "Incohérences détectées"
          pytest --cov=phi_complexity --cov-fail-under=80 || echo "Échec des tests"

      - name: 🚀 7. Synchronisation Souveraine (Push avec Rebase)
        if: github.event_name == 'push'
        run: |
          # Vérification robuste des changements
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.email "github-actions[bot]@://github.com"
            git config --local user.name "github-actions[bot]"
            
            git add .
            git commit -m "🧬 evolution: mutation structurelle [skip ci]"
            
            # TECHNIQUE INGÉNIEUR : On récupère les derniers commits et on rejoue la mutation par-dessus
            echo "Synchronisation avec le remote..."
            git fetch origin main
            git rebase origin/main
            
            # Poussée finale
            git push origin main
          else
            echo "L'organisme est déjà en harmonie. Aucune mutation."
          fi

      - name: 🧹 8. Nettoyage des branches éphémères
        if: github.event_name == 'schedule'
        run: |
          git fetch --prune
          git branch -r | grep 'origin/evolution/' | while read branch; do
            b=${branch#origin/}
            if [ -z "$(git log main..origin/$b)" ]; then
              git push origin --delete $b || true
            fi
          done
