name: Phi-Complexity CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.head_ref || github.ref_name }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov ruff
        pip install -e .

    - name: Auto-Fix (Ruff)
      # Auto-correct fixable lint issues and commit them back to the branch.
      # This prevents transient E741/F401 style violations from blocking CI.
      # Exit code 0 = no issues; 1 = issues found (some fixed, some may remain).
      # We allow both; the following hard-check step will catch anything unfixable.
      run: |
        ruff check --fix phi_complexity/ tests/; exit_code=$?
        if [ $exit_code -gt 1 ]; then exit $exit_code; fi
        if ! git diff --quiet -- phi_complexity/ tests/; then
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add phi_complexity/ tests/
          git commit -m "style(auto): ruff --fix applied by CI [skip ci]"
          git pull --rebase origin "$GITHUB_HEAD_REF" || git pull --rebase origin "$GITHUB_REF_NAME"
          git push
        fi

    - name: Lint (Ruff)
      run: |
        ruff check phi_complexity/ tests/

    - name: Run unit tests
      run: |
        pytest tests/ --cov=phi_complexity --cov-report=xml

    - name: Radiant Auto-Audit
      run: |
        python -m phi_complexity.cli check . --min-radiance 50
        python -m phi_complexity.cli memory

    - name: Formal Type Verification (MyPy)
      run: |
        pip install mypy
        mypy phi_complexity/
