name: Phi-Complexity CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov ruff
        pip install -e .

    - name: Lint (Ruff)
      run: |
        ruff check phi_complexity/ tests/

    - name: Run unit tests
      run: |
        pytest tests/ --cov=phi_complexity --cov-report=xml

    - name: Radiant Auto-Audit
      run: |
        python -m phi_complexity.cli check . --min-radiance 50
        python -m phi_complexity.cli memory

    - name: Formal Type Verification (MyPy)
      run: |
        pip install mypy
        mypy phi_complexity/
