# ╔══════════════════════════════════════════════════════════════════╗
# ║  PHI-CONSENSUS — Validation Croisée par Rétroaction Positive   ║
# ║  Récursive avec Journalisation & Caching Intelligent           ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Workflow intelligent de consensus multi-signal pour :
#   - Cybersécurité (audit + CWE + signatures)
#   - Cryptographie (sceaux gnostiques + intégrité SHA-256)
#   - Analyse rigoureuse (qualité + couverture + radiance)
#   - IA open source (vecteurs de résonance + harvest)
#
# Architecture :
#   Job 1 (securite)    ─┐
#   Job 2 (qualite)     ─┼─→ Job 4 (consensus) → Verdict & Journal
#   Job 3 (crypto)      ─┘
#
# Caching : https://docs.github.com/fr/actions/reference/workflows-and-actions/dependency-caching
#

name: "Phi Consensus RPR"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"   # Lundi 04:30 UTC — cycle hebdomadaire
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: phi-consensus-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: "0"

jobs:
  # ────────────────────────────────────────────
  # Signal 1 : Audit de Sécurité
  # ────────────────────────────────────────────
  securite:
    name: "Signal — Sécurité"
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.audit.outputs.score }}
      confiance: ${{ steps.audit.outputs.confiance }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer phi-complexity
        run: pip install -e .

      - name: Audit de sécurité
        id: audit
        run: |
          python -c "
          import json, sys, os
          from phi_complexity.securite import signer_rapport, JournalAudit

          # Audit : vérifier l'intégrité du journal existant
          journal = JournalAudit()
          integrite = journal.verifier_integrite()

          # Compter les fichiers Python de production
          fichiers_py = []
          for root, dirs, files in os.walk('phi_complexity'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      fichiers_py.append(os.path.join(root, f))

          nb_fichiers = len(fichiers_py)

          # Score de sécurité basé sur les contrôles
          controles = {
              'journal_integre': integrite,
              'security_md': os.path.exists('SECURITY.md'),
              'pre_commit': os.path.exists('.pre-commit-config.yaml'),
              'workflows_securite': (
                  os.path.exists('.github/workflows/security.yml')
                  and os.path.exists('.github/workflows/flawfinder.yml')
              ),
              'gitignore': os.path.exists('.gitignore'),
          }
          nb_ok = sum(1 for v in controles.values() if v)
          score = nb_ok / max(len(controles), 1)

          # Signer le résultat
          rapport = json.dumps({'controles': {k: v for k, v in controles.items()}, 'score': score})
          signature = signer_rapport(rapport)

          # Journaliser
          journal.enregistrer('consensus_securite', {
              'score': score,
              'controles': {k: v for k, v in controles.items()},
              'signature': signature,
          })

          # Exports
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f'score={score:.6f}\n')
              f.write(f'confiance=0.90\n')

          print(f'Score sécurité : {score * 100:.1f}% ({nb_ok}/{len(controles)} contrôles)')
          "

  # ────────────────────────────────────────────
  # Signal 2 : Analyse Qualité & Radiance
  # ────────────────────────────────────────────
  qualite:
    name: "Signal — Qualité"
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.analyse.outputs.score }}
      confiance: ${{ steps.analyse.outputs.confiance }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer dépendances
        run: |
          pip install -e .
          pip install pytest pytest-cov

      - name: Analyse qualité et radiance
        id: analyse
        run: |
          python -c "
          import json, sys, os

          # Exécuter les tests et capturer le résultat
          import subprocess
          result = subprocess.run(
              ['python', '-m', 'pytest', 'tests/', '--tb=no', '-q', '--no-header',
               '--cov=phi_complexity', '--cov-report=json:/tmp/cov.json'],
              capture_output=True, text=True, timeout=300
          )

          tests_ok = result.returncode == 0

          # Lire la couverture
          couverture = 0.0
          try:
              with open('/tmp/cov.json') as f:
                  cov_data = json.load(f)
              couverture = cov_data.get('totals', {}).get('percent_covered', 0.0) / 100.0
          except (FileNotFoundError, json.JSONDecodeError, KeyError):
              pass

          # Mesurer la radiance moyenne sur un échantillon
          from phi_complexity import auditer
          radiances = []
          for root, dirs, files in os.walk('phi_complexity'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py') and not f.startswith('__'):
                      chemin = os.path.join(root, f)
                      try:
                          m = auditer(chemin)
                          radiances.append(m.get('radiance', 0.0))
                      except Exception:
                          pass

          radiance_moy = sum(radiances) / max(len(radiances), 1) / 100.0

          # Score composite : 40% tests + 30% couverture + 30% radiance
          score = 0.40 * (1.0 if tests_ok else 0.0) + 0.30 * couverture + 0.30 * radiance_moy
          score = max(0.0, min(1.0, score))

          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f'score={score:.6f}\n')
              f.write(f'confiance=0.85\n')

          print(f'Score qualité : {score * 100:.1f}%')
          print(f'  Tests : {\"OK\" if tests_ok else \"FAIL\"}')
          print(f'  Couverture : {couverture * 100:.1f}%')
          print(f'  Radiance moy : {radiance_moy * 100:.1f}%')
          "

  # ────────────────────────────────────────────
  # Signal 3 : Intégrité Cryptographique
  # ────────────────────────────────────────────
  crypto:
    name: "Signal — Cryptographie"
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.crypto.outputs.score }}
      confiance: ${{ steps.crypto.outputs.confiance }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer phi-complexity
        run: pip install -e .

      - name: Vérification cryptographique
        id: crypto
        run: |
          python -c "
          import hashlib, json, os, sys

          from phi_complexity.securite import signer_rapport, verifier_signature

          # Vérifier l'intégrité de tous les fichiers sources par SHA-256
          fichiers = []
          for root, dirs, files in os.walk('phi_complexity'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      fichiers.append(os.path.join(root, f))

          nb_total = len(fichiers)
          nb_lisibles = 0
          hashes = {}
          for fpath in sorted(fichiers):
              try:
                  with open(fpath, 'rb') as fh:
                      h = hashlib.sha256(fh.read()).hexdigest()
                  hashes[fpath] = h
                  nb_lisibles += 1
              except OSError:
                  pass

          # Vérifier les signatures (round-trip)
          rapport = json.dumps(hashes, sort_keys=True)
          sig = signer_rapport(rapport)
          sig_valide = verifier_signature(rapport, sig)

          # Score crypto : intégrité des fichiers + signature OK
          ratio_lisibles = nb_lisibles / max(nb_total, 1)
          score = 0.5 * ratio_lisibles + 0.5 * (1.0 if sig_valide else 0.0)
          score = max(0.0, min(1.0, score))

          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f'score={score:.6f}\n')
              f.write(f'confiance=0.75\n')

          print(f'Score crypto : {score * 100:.1f}%')
          print(f'  Fichiers intègres : {nb_lisibles}/{nb_total}')
          print(f'  Signature SHA-256 : {\"VALIDE\" if sig_valide else \"INVALIDE\"}')
          "

  # ────────────────────────────────────────────
  # Consensus : Fusion RPR & Journalisation
  # ────────────────────────────────────────────
  consensus:
    name: "Consensus RPR"
    needs: [securite, qualite, crypto]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer phi-complexity
        run: pip install -e .

      - name: Calcul du consensus par rétroaction positive récursive
        id: consensus
        env:
          SCORE_SECURITE: ${{ needs.securite.outputs.score }}
          CONF_SECURITE: ${{ needs.securite.outputs.confiance }}
          SCORE_QUALITE: ${{ needs.qualite.outputs.score }}
          CONF_QUALITE: ${{ needs.qualite.outputs.confiance }}
          SCORE_CRYPTO: ${{ needs.crypto.outputs.score }}
          CONF_CRYPTO: ${{ needs.crypto.outputs.confiance }}
        run: |
          python -c "
          import os, json, re, sys

          from phi_complexity.consensus import (
              MoteurConsensus,
              JournalConsensus,
              SignalConsensus,
          )

          def safe_float(val, default=0.0):
              if val is None:
                  return default
              val = str(val).strip()
              if not val or not re.match(r'^[0-9.]+$', val):
                  return default
              try:
                  return float(val)
              except (ValueError, TypeError):
                  return default

          # Lire les scores des jobs parallèles
          s_sec = safe_float(os.environ.get('SCORE_SECURITE'))
          c_sec = safe_float(os.environ.get('CONF_SECURITE'), 0.9)
          s_qual = safe_float(os.environ.get('SCORE_QUALITE'))
          c_qual = safe_float(os.environ.get('CONF_QUALITE'), 0.85)
          s_cry = safe_float(os.environ.get('SCORE_CRYPTO'))
          c_cry = safe_float(os.environ.get('CONF_CRYPTO'), 0.75)

          # Construire les signaux
          signaux = [
              SignalConsensus('securite', s_sec, c_sec),
              SignalConsensus('qualite', s_qual, c_qual),
              SignalConsensus('crypto', s_cry, c_cry),
          ]

          # Moteur avec journalisation
          journal = JournalConsensus()
          moteur = MoteurConsensus(journal=journal)
          resultat = moteur.calculer_consensus(signaux)

          # Rapport ASCII
          print(moteur.rapport_consensus(resultat))

          # Export JSON
          os.makedirs('.phi/consensus', exist_ok=True)
          sha = os.environ.get('GITHUB_SHA', 'local')[:8]
          chemin = f'.phi/consensus/consensus-{sha}.json'
          moteur.exporter_json(resultat, chemin)

          # Gate : divergent → avertissement
          if not resultat.convergent:
              print('::warning::Consensus non convergent — vérification manuelle requise')

          print(f'Score consensus : {resultat.score_consensus * 100:.2f}%')
          print(f'Niveau : {resultat.niveau}')
          print(f'Convergence : {resultat.iterations} itérations')
          "

      - name: Uploader artifacts de consensus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phi-consensus-${{ github.sha }}
          path: .phi/consensus/
          retention-days: 14
