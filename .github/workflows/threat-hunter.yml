name: "🛡️ Threat Hunter — Détection Éthique de Vulnérabilités (φ-Sentinel)"

# Workflow de chasse aux menaces éthique.
# Combine l'analyse statique (phi-complexity), la détection CWE (backends C/Rust),
# le scoring bayésien (sentinel), et l'export IoC.
#
# Ce workflow ne collecte aucune donnée identifiante.
# Tous les résultats restent dans le dépôt (artefacts + Security tab).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 3 * * 1'  # Chaque lundi à 03h30 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  threat-hunt:
    name: "φ-Sentinel Threat Hunt"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: 📦 Installation
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 🔍 Audit statique φ-complexity (production)
        run: |
          mkdir -p .phi
          phi check ./phi_complexity --format json > .phi/audit_production.json 2>&1 || true
          echo "✅ Audit statique de production terminé."

      - name: 🛡️ Analyse CWE sur le code C/C++/Rust
        run: |
          python -c "
          import json, os, glob

          from phi_complexity.backends.c_rust_light import CRustLightBackend

          resultats = []
          patterns = ['**/*.c', '**/*.cpp', '**/*.h', '**/*.hpp', '**/*.rs']
          fichiers = []
          for p in patterns:
              fichiers.extend(glob.glob(p, recursive=True))

          for f in sorted(set(fichiers)):
              try:
                  backend = CRustLightBackend(f)
                  res = backend.analyser()
                  critiques = [a for a in res.annotations if a.niveau == 'CRITICAL']
                  if critiques:
                      for a in critiques:
                          resultats.append({
                              'fichier': f,
                              'ligne': a.ligne,
                              'categorie': a.categorie,
                              'message': a.message,
                              'niveau': a.niveau,
                          })
              except Exception as e:
                  print(f'⚠️ Erreur sur {f}: {e}')

          os.makedirs('.phi', exist_ok=True)
          with open('.phi/cwe_findings.json', 'w') as out:
              json.dump({'total': len(resultats), 'findings': resultats}, out, indent=2, ensure_ascii=False)

          if resultats:
              print(f'🚨 {len(resultats)} vulnérabilité(s) CWE détectée(s).')
              for r in resultats:
                  print(f\"  ⚠ {r['fichier']}:{r['ligne']} — {r['categorie']}: {r['message'][:80]}\")
          else:
              print('✅ Aucune vulnérabilité CWE détectée.')
          "

      - name: 📊 Sentinel — Score comportemental
        run: |
          python -c "
          import json, os
          from phi_complexity.sentinel import (
              BayesianCorrelator,
              SentinelResponse,
          )

          correlator = BayesianCorrelator()

          # Score sans signaux OS (CI = environnement contrôlé)
          # Le score commit sera fourni par le workflow commit-risk séparé.
          score = correlator.calculer_score(
              signaux=[],
              traces=[],
              score_commit=0.0,
          )

          responder = SentinelResponse()
          alertes = responder.generer_alertes(score)
          rapport = responder.rapport_console(alertes)
          print(rapport)

          # Export IoC
          os.makedirs('.phi', exist_ok=True)
          responder.exporter_ioc_json(alertes, '.phi/ioc_bundle.json')
          print('✅ IoC bundle exporté dans .phi/ioc_bundle.json')
          "

      - name: 📄 Rapport de synthèse
        run: |
          python -c "
          import json, os

          print('╔══════════════════════════════════════════════════╗')
          print('║   PHI-SENTINEL — RAPPORT THREAT HUNT             ║')
          print('╚══════════════════════════════════════════════════╝')
          print()

          # CWE findings
          cwe_path = '.phi/cwe_findings.json'
          if os.path.exists(cwe_path):
              with open(cwe_path) as f:
                  cwe = json.load(f)
              print(f'  CWE Findings   : {cwe[\"total\"]}')
              for finding in cwe.get('findings', [])[:5]:
                  print(f'    ⚠ {finding[\"fichier\"]}:{finding[\"ligne\"]} [{finding[\"categorie\"]}]')
          else:
              print('  CWE Findings   : N/A')

          # IoC bundle
          ioc_path = '.phi/ioc_bundle.json'
          if os.path.exists(ioc_path):
              with open(ioc_path) as f:
                  ioc = json.load(f)
              nb_ioc = len(ioc.get('objects', []))
              print(f'  IoC exportés   : {nb_ioc}')
          else:
              print('  IoC exportés   : 0')

          print()
          print('  ─────────────────────────────────────────────────')
          print('  Ancré dans le Morphic Phi Framework — φ-Meta 2026')
          "

      - name: 📁 Upload artefacts de chasse
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threat-hunt-results-${{ github.sha }}
          path: |
            .phi/cwe_findings.json
            .phi/ioc_bundle.json
            .phi/audit_production.json
          retention-days: 30
