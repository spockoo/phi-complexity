name: "🐤 Runner Canary — Santé des labels OS (φ-Canary)"

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe-runners:
    name: "canary (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04
          - macos-latest
          - macos-14
          - windows-latest

    steps:
      - name: 🩺 Probe label
        run: |
          echo "✅ runner label operational: ${{ matrix.os }}"
          echo "runner_os=$RUNNER_OS"
          echo "runner_arch=$RUNNER_ARCH"
