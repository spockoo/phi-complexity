name: "🔧 Phi AutoFix — Remédiation Déterministe"

on:
  workflow_run:
    workflows:
      - "🧠 CI Auto-Diagnostic — Classification des échecs (φ-Diagnostic)"
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID du ci-auto-diagnostic à traiter"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-mutations:
    runs-on: ubuntu-latest
    outputs:
      has_mutations: ${{ steps.check.outputs.has_mutations }}
      artifact_run_id: ${{ steps.check.outputs.artifact_run_id }}
    steps:
      - name: 🔎 Trouver et télécharger le diagnostic artifact
        id: download
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let targetRunId;
            if (context.eventName === "workflow_dispatch" && context.payload.inputs?.run_id) {
              targetRunId = parseInt(context.payload.inputs.run_id, 10);
            } else if (context.payload.workflow_run) {
              targetRunId = context.payload.workflow_run.id;
            } else {
              core.setFailed("Impossible de déterminer le run_id source.");
              return;
            }
            core.exportVariable("ARTIFACT_RUN_ID", String(targetRunId));
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: targetRunId, per_page: 100 }
            );
            const diagArtifact = artifacts.find((a) =>
              a.name.startsWith("ci-auto-diagnostic-")
            );
            if (!diagArtifact) {
              console.log("Aucun artifact ci-auto-diagnostic trouvé.");
              core.setOutput("found", "false");
              return;
            }
            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: diagArtifact.id,
              archive_format: "zip"
            });
            const fs = require("fs");
            fs.writeFileSync("diag-artifact.zip", Buffer.from(download.data));
            core.setOutput("found", "true");
            core.setOutput("artifact_id", String(diagArtifact.id));

      - name: 📦 Extraire l'artifact
        run: |
          if [ -f diag-artifact.zip ]; then
            unzip -o diag-artifact.zip -d .phi/
          fi

      - name: 🔍 Vérifier les mutations applicables
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const diagPath = ".phi/ci-auto-diagnostic.json";
            const runId = process.env.ARTIFACT_RUN_ID || "0";
            core.setOutput("artifact_run_id", runId);
            if (!fs.existsSync(diagPath)) {
              console.log("Fichier de diagnostic absent.");
              core.setOutput("has_mutations", "false");
              return;
            }
            const data = JSON.parse(fs.readFileSync(diagPath, "utf8"));
            const DETERMINISTIC_CATALOGUE = new Set([
              "QUALITY_GATE",
              "DEPENDENCY_INSTALL",
              "TYPE_CHECK",
              "TEST_REGRESSION"
            ]);
            const applicable = (data.proposed_mutations || []).filter(
              (m) =>
                m.confidence >= 0.85 &&
                DETERMINISTIC_CATALOGUE.has(m.category)
            );
            console.log(`Mutations applicables: ${applicable.length}`);
            core.setOutput("has_mutations", applicable.length > 0 ? "true" : "false");

  propose-autofix:
    needs: check-mutations
    if: needs.check-mutations.outputs.has_mutations == 'true'
    runs-on: ubuntu-latest
    environment: phi-autofix
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Installer phi-complexity
        run: pip install -e . ruff black mypy pytest pytest-cov

      - name: 🔎 Télécharger le diagnostic artifact
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = parseInt("${{ needs.check-mutations.outputs.artifact_run_id }}", 10);
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: runId, per_page: 100 }
            );
            const diagArtifact = artifacts.find((a) =>
              a.name.startsWith("ci-auto-diagnostic-")
            );
            if (!diagArtifact) {
              core.setFailed("Artifact non trouvé.");
              return;
            }
            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: diagArtifact.id,
              archive_format: "zip"
            });
            const fs = require("fs");
            fs.mkdirSync(".phi", { recursive: true });
            fs.writeFileSync("diag-artifact.zip", Buffer.from(download.data));

      - name: 📦 Extraire le diagnostic
        run: unzip -o diag-artifact.zip -d .phi/

      - name: 🔧 Appliquer les mutations déterministes
        id: apply
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require("fs");
            const { execSync } = require("child_process");
            const { owner, repo } = context.repo;
            const data = JSON.parse(fs.readFileSync(".phi/ci-auto-diagnostic.json", "utf8"));
            const runId = data.run_id;
            const SOURCE_WORKFLOW_ALLOWLIST = new Set([
              ".github/workflows/ci-auto-diagnostic.yml",
              ".github/workflows/phi-autofix.yml",
              ".github/workflows/tests.yml"
            ]);
            // Keep in sync with pyproject.toml/CI coverage gate.
            const COVERAGE_THRESHOLD = 89;
            const VALIDATION_CMD =
              `ruff check . && black --check . && python -m mypy phi_complexity --ignore-missing-imports ` +
              `&& pytest --cov=phi_complexity --cov-report=term-missing --cov-fail-under=${COVERAGE_THRESHOLD} -q`;

            function isAllowedSourcePath(path) {
              if (!path || path.endsWith(".zip")) return false;
              if (SOURCE_WORKFLOW_ALLOWLIST.has(path)) return true;
              if (path === "pyproject.toml") return true;
              return path.endsWith(".py");
            }

            function listPaths(command) {
              try {
                const raw = execSync(command, { shell: true, encoding: "utf8" }).trim();
                return raw ? raw.split("\n").map((line) => line.trim()).filter(Boolean) : [];
              } catch (error) {
                throw new Error(`Commande git échouée (${command}): ${error.message}`);
              }
            }

            function quotePath(path) {
              return JSON.stringify(path);
            }

            const DETERMINISTIC_CATALOGUE = {
              QUALITY_GATE: "ruff check --fix . && black .",
              DEPENDENCY_INSTALL: "pip install -e . --upgrade",
              TYPE_CHECK: "python -m mypy phi_complexity/ --ignore-missing-imports || true",
              TEST_REGRESSION: "python -m pytest tests/ -x --no-header -q || true"
            };
            const applicable = (data.proposed_mutations || []).filter(
              (m) =>
                m.confidence >= 0.85 &&
                Object.prototype.hasOwnProperty.call(DETERMINISTIC_CATALOGUE, m.category)
            );
            for (const mutation of applicable) {
              const safeCategory = mutation.category.replace(/[^A-Z_]/g, "");
              const parsedRunId = parseInt(String(runId), 10);
              if (!Number.isFinite(parsedRunId) || parsedRunId <= 0) {
                console.error(`run_id invalide: ${runId}`);
                continue;
              }
              const safeRunId = String(parsedRunId);
              const branch = `autofix/${safeCategory.toLowerCase()}`;
              try {
                execSync("rm -f diag-artifact.zip", { shell: true });
                execSync("git fetch origin", { stdio: "inherit", shell: true });
                try {
                  execSync(`git checkout -B ${branch} origin/${branch}`, { stdio: "inherit", shell: true });
                } catch {
                  execSync("git checkout main", { stdio: "inherit", shell: true });
                  execSync(`git checkout -B ${branch}`, { stdio: "inherit", shell: true });
                }
                const cmd = DETERMINISTIC_CATALOGUE[mutation.category];
                execSync(cmd, { stdio: "inherit", shell: true });
                const changedPaths = listPaths("git diff --name-only");
                const sourcePaths = changedPaths.filter(isAllowedSourcePath);
                if (sourcePaths.length === 0) {
                  console.log(
                    `Aucun changement source applicable pour ${safeCategory}; PR non créée (no-op/artefact-only).`
                  );
                  execSync("git reset --hard", { stdio: "inherit", shell: true });
                  execSync("git clean -fd", { stdio: "inherit", shell: true });
                  continue;
                }
                const disallowedPaths = changedPaths.filter((path) => !isAllowedSourcePath(path));
                if (disallowedPaths.length > 0) {
                  console.log(
                    `Fichiers non autorisés ignorés pour ${safeCategory}: ${disallowedPaths.join(", ")}`
                  );
                  execSync(
                    `git restore --worktree --staged -- ${disallowedPaths.map(quotePath).join(" ")}`,
                    { stdio: "inherit", shell: true }
                  );
                }
                execSync(`git add -- ${sourcePaths.map(quotePath).join(" ")}`, {
                  stdio: "inherit",
                  shell: true
                });
                const stagedPaths = listPaths("git diff --cached --name-only");
                if (stagedPaths.length === 0) {
                  console.log(`Aucun changement source stageable pour ${safeCategory}; skip.`);
                  execSync("git reset --hard", { stdio: "inherit", shell: true });
                  execSync("git clean -fd", { stdio: "inherit", shell: true });
                  continue;
                }
                const stagedDisallowed = stagedPaths.filter((path) => !isAllowedSourcePath(path));
                if (stagedDisallowed.length > 0) {
                  throw new Error(`Fichiers non autorisés dans le commit: ${stagedDisallowed.join(", ")}`);
                }
                execSync(VALIDATION_CMD, { stdio: "inherit", shell: true });
                execSync("git config user.name 'github-actions[bot]'");
                execSync("git config user.email '41898282+github-actions[bot]@users.noreply.github.com'");
                const commitMsg = `🔧 autofix(${safeCategory}): mutation déterministe — run #${safeRunId}`;
                execSync("git commit --message=" + JSON.stringify(commitMsg), { stdio: "inherit", shell: true });
                execSync(`git push origin ${branch}`, { stdio: "inherit" });
                const headRef = `${owner}:${branch}`;
                const existingPrs = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: "open",
                  head: headRef,
                  base: "main",
                  per_page: 100
                });
                const prBody = `## 🧬 Mutation déterministe automatique\n\n- **Catégorie** : ${safeCategory}\n- **Confiance** : ${(mutation.confidence * 100).toFixed(0)}%\n- **Action** : ${mutation.action}\n- **Run source** : https://github.com/${owner}/${repo}/actions/runs/${safeRunId}\n\n> Généré automatiquement par phi-autofix.`;
                if (existingPrs.length > 0) {
                  const existing = existingPrs[0];
                  await github.rest.pulls.update({
                    owner,
                    repo,
                    pull_number: existing.number,
                    title: `🔧 [phi:autofix] ${safeCategory} — Run #${safeRunId}`,
                    body: prBody
                  });
                  console.log(`PR mise à jour : ${existing.html_url}`);
                } else {
                  const pr = await github.rest.pulls.create({
                    owner,
                    repo,
                    title: `🔧 [phi:autofix] ${safeCategory} — Run #${safeRunId}`,
                    head: branch,
                    base: "main",
                    body: prBody,
                    draft: true
                  });
                  console.log(`PR créée : ${pr.data.html_url}`);
                }
              } catch (err) {
                console.error(`Erreur pour ${mutation.category}: ${err.message}`);
              } finally {
                try {
                  execSync("git checkout main", { stdio: "inherit", shell: true });
                  execSync("git reset --hard", { stdio: "inherit", shell: true });
                  execSync("git clean -fd", { stdio: "inherit", shell: true });
                } catch {}
              }
            }

      - name: 🧹 Gouvernance des PR autofix no-op
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const NOOP_LABEL = "autofix/no-op";
            function shouldExcludePath(path) {
              if (!path) return true;
              return path.endsWith(".zip") || path.startsWith(".phi/");
            }
            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: NOOP_LABEL,
                color: "c2e0c6",
                description: "Autofix PR sans changement source exécutable"
              });
            } catch {}
            const openAutofixPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            for (const pr of openAutofixPrs) {
              if (pr.user?.login !== "github-actions[bot]") continue;
              if (!String(pr.title || "").includes("[phi:autofix]")) continue;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100
              });
              const isNoopPr = files.length === 0 || files.every((file) => shouldExcludePath(file.filename));
              if (!isNoopPr) continue;
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [NOOP_LABEL]
              });
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: "closed"
              });
              console.log(`PR no-op fermée: ${pr.html_url}`);
            }
