# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow requires that you have an existing account with codescan.io
# For more information about configuring your workflow,
# read our documentation at https://github.com/codescan-io/codescan-scanner-action

# Mécanismes autodéclencheurs :
#   · push/PR sur main          — analyse directe
#   · schedule (vendredi 05h42) — audit périodique
#   · workflow_run              — auto-déclenché par les rapports de sécurité
#                                 et les résultats de tests/couverture

name: "🔒 CodeScan — Analyse Statique & Couverture Déterministe"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '42 5 * * 5'
  # Auto-déclenchement alimenté par les rapports de cybersécurité
  # et l'état de la couverture des workflows en amont.
  workflow_run:
    workflows:
      - "CI — Tests & Qualité (φ-Stable)"
      - "🛡️ Threat Hunter — Détection Éthique de Vulnérabilités (φ-Sentinel)"
      - "🔬 Sentinel SARIF — Export Sécurité vers GitHub Security Tab"
    types: [completed]
    branches: [ main ]

permissions:
  contents: read

jobs:
    # ─────────────────────────────────────────────────────────────
    # JOB 1 — Analyse statique CodeScan (SonarScanner)
    # ─────────────────────────────────────────────────────────────
    CodeScan:
        permissions:
          contents: read # for actions/checkout to fetch code
          security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
          actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            -   name: Set up Java 17
                uses: actions/setup-java@v4
                with:
                    distribution: temurin
                    java-version: '17'
            -   name: Verify and Enforce Java Version
                run: |
                    echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
                    echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"
                    echo "JAVA_HOME is set to: $JAVA_HOME"
                    echo "java binary: $(command -v java)"
                    java -version
                    if [ "$(command -v java)" != "$JAVA_HOME/bin/java" ]; then
                      echo "❌ java does not resolve to JAVA_HOME/bin/java"
                      exit 1
                    fi
                    JAVA_VER=$("$JAVA_HOME/bin/java" -XshowSettings:properties -version 2>&1 | awk -F ' = ' '/java.specification.version/ {print $2; exit}')
                    if [ -z "$JAVA_VER" ]; then
                      echo "❌ Unable to detect Java specification version"
                      exit 1
                    fi
                    echo "☕ Java version détectée : $JAVA_VER"
                    if [ "$JAVA_VER" -lt 17 ]; then
                      echo "❌ Java $JAVA_VER < 17 — incompatible avec SonarScanner"
                      exit 1
                    fi
                    echo "✅ Java $JAVA_VER — compatible avec SonarScanner"
            -   name: Cache files
                uses: actions/cache@v4
                with:
                    path: |
                        ~/.sonar
                    key: ${{ runner.os }}-sonar-java17-${{ hashFiles('**/*.py', '**/*.yml') }}
                    restore-keys: |
                        ${{ runner.os }}-sonar-java17-
            -   name: Run Analysis
                uses: codescan-io/codescan-scanner-action@955d3d1b4a9e374064189719484005ce8e08a749
                with:
                    login: ${{ secrets.CODESCAN_AUTH_TOKEN }}
                    organization: ${{ secrets.CODESCAN_ORGANIZATION_KEY }}
                    projectKey: ${{ secrets.CODESCAN_PROJECT_KEY }}
            -   name: SARIF status
                if: ${{ hashFiles('codescan.sarif') == '' }}
                run: |
                    echo "::warning::codescan.sarif absent après CodeScan. Vérifier CODESCAN_AUTH_TOKEN / ORGANIZATION_KEY / PROJECT_KEY (401 possible)."
            -   name: Upload SARIF file
                if: ${{ hashFiles('codescan.sarif') != '' }}
                uses: github/codeql-action/upload-sarif@v4
                with:
                    sarif_file: codescan.sarif

    # ─────────────────────────────────────────────────────────────
    # JOB 2 — Couverture déterministe (φ-Coverage Gate)
    # Mesure absolue et reproductible de la couverture.
    # Déclenchée automatiquement avec le CodeScan pour
    # garantir une vue convergente sécurité + couverture.
    # ─────────────────────────────────────────────────────────────
    coverage-gate:
        name: "φ-Coverage Gate Déterministe"
        permissions:
          contents: read
          actions: read
        runs-on: ubuntu-latest
        env:
          COVERAGE_THRESHOLD: "89"
        steps:
            -   name: 📥 Checkout
                uses: actions/checkout@v4

            -   name: 🐍 Setup Python 3.12
                uses: actions/setup-python@v5
                with:
                    python-version: "3.12"
                    cache: 'pip'

            -   name: 📦 Installation
                run: |
                    python -m pip install --upgrade pip
                    pip install pytest pytest-cov
                    pip install -e .

            -   name: 🔬 Mesure de couverture déterministe
                env:
                    PYTHONDONTWRITEBYTECODE: "1"
                    PYTHONHASHSEED: "0"
                run: |
                    mkdir -p .phi
                    pytest --override-ini="addopts=" \
                           --cov=phi_complexity \
                           --cov-report=json:.phi/coverage.json \
                           --cov-report=term-missing \
                           -p no:randomly \
                           -x

            -   name: 📊 Rapport de couverture déterministe
                if: always()
                run: |
                    python -c "
                    import json, sys, os

                    cov_path = '.phi/coverage.json'
                    if not os.path.exists(cov_path):
                        print('⚠️  Aucun rapport de couverture généré.')
                        sys.exit(0)

                    with open(cov_path) as f:
                        data = json.load(f)

                    total = data['totals']['percent_covered']
                    stmts = data['totals']['num_statements']
                    miss = data['totals']['missing_lines']

                    print('╔══════════════════════════════════════════════════╗')
                    print('║   φ-COVERAGE GATE — RAPPORT DÉTERMINISTE        ║')
                    print('╚══════════════════════════════════════════════════╝')
                    print()
                    print(f'  Couverture totale : {total:.2f}%')
                    print(f'  Statements        : {stmts}')
                    print(f'  Lignes manquées   : {miss}')
                    print()

                    seuil = float(os.environ.get('COVERAGE_THRESHOLD', '89'))
                    modules_faibles = []
                    for fichier, info in data['files'].items():
                        pct = info['summary']['percent_covered']
                        if pct < seuil:
                            modules_faibles.append((fichier, pct))

                    if modules_faibles:
                        print(f'  ⚠️  {len(modules_faibles)} module(s) sous {seuil}% :')
                        for f, p in sorted(modules_faibles, key=lambda x: x[1]):
                            print(f'    ▸ {f}: {p:.1f}%')
                    else:
                        print(f'  ✅ Tous les modules ≥ {seuil}%')

                    print()
                    print('  ─────────────────────────────────────────────────')
                    print('  φ-Coverage Gate · Déterministe · PYTHONHASHSEED=0')
                    "

            -   name: 📁 Upload artefact couverture
                if: always()
                uses: actions/upload-artifact@v4
                with:
                    name: coverage-deterministic-${{ github.sha }}
                    path: .phi/coverage.json
                    retention-days: 14
